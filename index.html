<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nourish - AI Meal Planner</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        
        /* INPUT SECTION */
        .input-section {
            background-color: #2c2c2c;
            padding: 30px;
            border-radius: 12px;
            max-width: 900px;
            margin: 0 auto 40px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .title { 
            font-size: 2em; 
            color: #ff6b35; 
            margin-bottom: 4px; 
            font-weight: 700;
        }
        
        .subtitle { 
            font-size: 1em; 
            color: #aaa; 
            margin-bottom: 8px; 
        }
        
        .model-indicator { 
            font-size: 0.85em; 
            color: #888; 
            margin-bottom: 20px; 
            padding: 8px 12px;
            background: #1a1a1a;
            border-radius: 6px;
            display: inline-block;
        }
        
        label { 
            display: block; 
            font-size: 0.9em; 
            color: #bbb; 
            margin-bottom: 6px; 
            margin-top: 18px;
            font-weight: 500;
        }
        
        input[type="text"] {
            background-color: #3c3c3c;
            color: #fff;
            border: 2px solid #444;
            padding: 12px 14px;
            border-radius: 8px;
            width: 100%;
            font-size: 1em;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus { 
            outline: none; 
            border-color: #ff6b35; 
        }
        
        .goal-label { 
            margin-top: 24px; 
            margin-bottom: 10px; 
            font-size: 0.9em; 
            color: #bbb;
            font-weight: 500;
        }
        
        .goal-buttons { 
            display: flex; 
            gap: 12px; 
        }
        
        .goal-btn {
            flex: 1; 
            padding: 12px; 
            border-radius: 8px;
            border: 2px solid #444; 
            background: #3c3c3c;
            color: #aaa; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s;
            font-size: 0.95em;
        }
        
        .goal-btn:hover {
            border-color: #555;
            background: #4c4c4c;
        }
        
        .goal-btn.active { 
            border-color: #ff6b35; 
            background: #ff6b35; 
            color: #fff; 
        }
        
        #generateBtn {
            width: 100%; 
            margin-top: 28px; 
            padding: 14px;
            border-radius: 8px; 
            border: none; 
            background: linear-gradient(135deg, #ff6b35, #ff8555);
            color: #fff; 
            font-size: 1em; 
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.2s;
        }
        
        #generateBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }
        
        #generateBtn:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
        }
        
        .control-messages {
            display: none; 
            margin-top: 20px;
        }
        
        #loading { 
            color: #ff6b35; 
            font-size: 0.95em; 
            text-align: center;
            padding: 12px;
            background: rgba(255, 107, 53, 0.1);
            border-radius: 8px;
            display: none;
        }
        
        #error {
            padding: 14px;
            background: rgba(255, 68, 68, 0.15); 
            border: 2px solid #ff4444;
            border-radius: 8px; 
            color: #ff6666; 
            font-size: 0.9em;
            display: none;
        }
        
        /* MEAL PLAN DISPLAY SECTION */
        .meal-plan-container {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
        }
        
        .meal-plan-container.active { 
            display: grid; 
        }
        
        /* DAY CARDS (LEFT - ACCORDION) */
        .days-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .day-accordion {
            background: #2c2c2c;
            border-radius: 12px;
            border-left: 5px solid #ff6b35;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        
        .day-accordion-header {
            padding: 18px 20px;
            background: #3c3c3c;
            color: #fff;
            font-weight: 600;
            font-size: 1.1em;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            user-select: none;
        }
        
        .day-accordion-header:hover { 
            background: #4c4c4c; 
        }
        
        .day-accordion-header.expanded { 
            background: #ff6b35;
            color: #fff;
        }
        
        .accordion-arrow {
            font-size: 1.2em;
            transition: transform 0.3s;
        }
        
        .day-accordion-header.expanded .accordion-arrow {
            transform: rotate(180deg);
        }
        
        .day-accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: #2c2c2c;
        }
        
        .day-accordion-content.expanded {
            max-height: 3000px;
        }
        
        .day-content {
            padding: 24px;
        }
        
        .meal-type {
            margin-bottom: 28px;
        }
        
        .meal-type:last-child { 
            margin-bottom: 0; 
        }
        
        .meal-type-header {
            font-size: 0.9em;
            font-weight: 700;
            color: #ff6b35;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .meal-name {
            font-size: 1.15em;
            color: #fff;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .ingredients-section {
            margin-bottom: 16px;
        }
        
        .section-label {
            font-size: 0.8em;
            color: #999;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        
        .ingredients-list {
            font-size: 0.95em;
            color: #ddd;
            line-height: 1.8;
            margin-left: 16px;
        }
        
        .ingredient-item {
            margin-bottom: 6px;
            color: #e0e0e0;
        }
        
        .ingredient-item::before {
            content: "•";
            margin-right: 8px;
            color: #ff6b35;
            font-weight: bold;
        }
        
        .instructions-section {
            margin-top: 14px;
        }
        
        .instructions-list {
            font-size: 0.95em;
            color: #ddd;
            line-height: 1.9;
            list-style: none;
            counter-reset: step;
        }
        
        .instruction-item {
            margin-bottom: 10px;
            margin-left: 32px;
            counter-increment: step;
            position: relative;
            color: #e0e0e0;
        }
        
        .instruction-item::before {
            content: counter(step);
            position: absolute;
            left: -32px;
            top: 0;
            background: #ff6b35;
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75em;
            font-weight: 700;
        }
        
        /* GROCERY LIST PANEL (RIGHT) */
        .grocery-panel {
            background: #2c2c2c;
            border-radius: 12px;
            border-left: 5px solid #44aa44;
            padding: 24px;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            position: sticky;
            top: 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        
        .grocery-panel-title {
            font-size: 1.15em;
            font-weight: 700;
            color: #44aa44;
            margin-bottom: 18px;
            text-align: center;
        }
        
        .grocery-category {
            margin-bottom: 20px;
        }
        
        .grocery-category:last-child {
            margin-bottom: 0;
        }
        
        .category-label {
            font-size: 0.8em;
            font-weight: 700;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        
        .grocery-item {
            padding: 10px 0;
            font-size: 0.95em;
            color: #ddd;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        
        .grocery-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #44aa44;
            flex-shrink: 0;
            margin-top: 2px;
        }
        
        .grocery-item-text {
            flex: 1;
            word-break: break-word;
        }
        
        .grocery-item.checked .grocery-item-text {
            text-decoration: line-through;
            color: #666;
        }
        
        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #2c2c2c;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ff6b35;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #ff8555;
        }
        
        /* RESPONSIVE */
        @media (max-width: 1200px) {
            .meal-plan-container {
                grid-template-columns: 1fr;
            }
            
            .grocery-panel {
                position: static;
                max-height: none;
            }
        }
        
        @media (max-width: 768px) {
            .input-section {
                padding: 20px;
                margin-bottom: 30px;
            }
            
            .title {
                font-size: 1.6em;
            }
            
            .day-accordion-header {
                padding: 14px 16px;
                font-size: 1em;
            }
            
            .day-content {
                padding: 16px;
            }
            
            .goal-buttons {
                gap: 8px;
            }
            
            .goal-btn {
                padding: 10px;
                font-size: 0.85em;
            }
            
            #generateBtn {
                margin-top: 20px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- INPUT SECTION -->
    <div class="input-section">
        <h1 class="title">🍽️ Nourish</h1>
        <p class="subtitle">Your AI Meal Planner</p>
        <p id="modelIndicator" class="model-indicator">Loading model...</p>

        <label for="likes">Foods you like</label>
        <input type="text" id="likes" placeholder="e.g. chicken, pasta, avocado" />

        <label for="hates">Foods you hate or can't eat</label>
        <input type="text" id="hates" placeholder="e.g. mushrooms, shellfish, dairy" />

        <p class="goal-label">Your goal</p>
        <div class="goal-buttons">
            <button class="goal-btn" onclick="setGoal('Cut', this)">Cut</button>
            <button class="goal-btn" onclick="setGoal('Maintain', this)">Maintain</button>
            <button class="goal-btn" onclick="setGoal('Gain', this)">Gain</button>
        </div>

        <button id="generateBtn" onclick="generateMealPlan()">Generate Meal Plan</button>

        <div class="control-messages">
            <div id="loading">🍳 Generating your meal plan...</div>
            <div id="error"></div>
        </div>
    </div>

    <!-- MEAL PLAN DISPLAY -->
    <div class="meal-plan-container" id="mealPlanContainer">
        <div class="days-panel" id="daysPanel"></div>
        <div class="grocery-panel" id="groceryPanel"></div>
    </div>

    <script>
        let goal = '';
        let activeModel = 'qwen2.5-coder-7b-instruct';

        async function loadModel() {
            try {
                const res = await fetch('http://localhost:1234/v1/models');
                const data = await res.json();
                if (data?.data?.[0]?.id) {
                    activeModel = data.data[0].id;
                    document.getElementById('modelIndicator').textContent = '🤖 Model: ' + activeModel;
                }
            } catch (e) {
                document.getElementById('modelIndicator').textContent = '⚠️ Could not connect to LM Studio';
            }
        }

        loadModel();

        function setGoal(newGoal, btn) {
            goal = newGoal;
            document.querySelectorAll('.goal-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function generateMealPlan() {
            const likes = document.getElementById('likes').value.trim();
            const hates = document.getElementById('hates').value.trim();
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const btn = document.getElementById('generateBtn');
            const controlMessages = document.querySelector('.control-messages');

            if (!goal) {
                error.textContent = 'Please select a goal (Cut, Maintain, or Gain)';
                controlMessages.style.display = 'block';
                error.style.display = 'block';
                return;
            }

            controlMessages.style.display = 'block';
            error.style.display = 'none';
            loading.style.display = 'block';
            btn.disabled = true;

            try {
                const response = await fetch('http://localhost:1234/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: activeModel,
                        messages: [
                            {
                                role: 'system',
                                content: `You are a professional chef and nutritionist. Generate a 3-day meal plan based on user preferences and goals.

CRITICAL: Respond ONLY with valid JSON. No other text before or after the JSON.

Use this exact JSON structure:
{
  "days": [
    {
      "day": 1,
      "breakfast": {
        "name": "Meal name",
        "ingredients": [
          {"item": "ingredient name", "quantity": "1", "unit": "cup"}
        ],
        "instructions": ["Step 1", "Step 2"]
      },
      "lunch": { "name": "", "ingredients": [], "instructions": [] },
      "dinner": { "name": "", "ingredients": [], "instructions": [] }
    }
  ],
  "groceryList": [
    {"item": "ingredient", "quantity": "2", "unit": "lbs", "category": "Produce"}
  ]
}

Requirements:
- Generate exactly 3 days
- Each day must have breakfast, lunch, and dinner
- Every ingredient must have: item name, quantity number, and unit
- No vague terms like "to taste" or "handful"
- List each ingredient individually (no "mixed vegetables")
- Every ingredient in instructions must appear in the ingredients list
- Recipes should be realistic and followable
- Grocery list categories: Produce, Proteins, Dairy, Grains, Pantry, Other
- Do not repeat meals across the 3 days
- Respond ONLY with the JSON object, no other text`
                            },
                            {
                                role: 'user',
                                content: `Goal: ${goal}
Favorite foods: ${likes || 'any'}
Foods to avoid: ${hates || 'none'}

Generate the 3-day meal plan as JSON only.`
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 3000
                    })
                });

                if (!response.ok) throw new Error('API error');

                const data = await response.json();
                const result = data?.choices?.[0]?.message?.content;
                if (!result) throw new Error('No content');

                // Parse and validate JSON
                let mealPlanData;
                try {
                    // Extract JSON from response (in case there's extra text)
                    const jsonMatch = result.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error('No JSON found in response');
                    mealPlanData = JSON.parse(jsonMatch[0]);
                } catch (parseErr) {
                    error.textContent = 'Failed to parse meal plan. The model may not have returned valid JSON.';
                    error.style.display = 'block';
                    loading.style.display = 'none';
                    btn.disabled = false;
                    return;
                }

                // Validate structure
                if (!mealPlanData.days || !Array.isArray(mealPlanData.days) || mealPlanData.days.length === 0) {
                    throw new Error('Invalid meal plan structure');
                }

                renderMealPlan(mealPlanData);
                controlMessages.style.display = 'none';
            } catch (err) {
                error.textContent = 'Error: ' + (err.message || 'Something went wrong. Make sure LM Studio is running on port 1234.');
                error.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                btn.disabled = false;
            }
        }

        function renderMealPlan(mealPlanData) {
            document.getElementById('mealPlanContainer').classList.add('active');
            
            const daysPanel = document.getElementById('daysPanel');
            const groceryPanel = document.getElementById('groceryPanel');

            daysPanel.innerHTML = '';
            groceryPanel.innerHTML = '';

            // Render day accordions
            mealPlanData.days.forEach((dayData, index) => {
                const accordion = createDayAccordion(dayData);
                daysPanel.appendChild(accordion);

                // Add expand/collapse handler
                const header = accordion.querySelector('.day-accordion-header');
                header.addEventListener('click', () => {
                    toggleAccordion(accordion, daysPanel);
                });
            });

            // Expand first day by default
            if (daysPanel.children.length > 0) {
                toggleAccordion(daysPanel.children[0], daysPanel);
            }

            // Render grocery list grouped by category
            renderGroceryList(mealPlanData.groceryList || []);
        }

        function createDayAccordion(dayData) {
            const accordion = document.createElement('div');
            accordion.className = 'day-accordion';

            const header = document.createElement('div');
            header.className = 'day-accordion-header';
            header.innerHTML = `
                Day ${dayData.day}
                <span class="accordion-arrow">▾</span>
            `;

            const content = document.createElement('div');
            content.className = 'day-accordion-content';

            const contentInner = document.createElement('div');
            contentInner.className = 'day-content';

            // Add meals
            ['breakfast', 'lunch', 'dinner'].forEach(mealType => {
                const meal = dayData[mealType];
                if (meal) {
                    const mealHTML = createMealSection(mealType, meal);
                    contentInner.appendChild(mealHTML);
                }
            });

            content.appendChild(contentInner);
            accordion.appendChild(header);
            accordion.appendChild(content);

            return accordion;
        }

        function createMealSection(mealType, meal) {
            const section = document.createElement('div');
            section.className = 'meal-type';

            const header = document.createElement('div');
            header.className = 'meal-type-header';
            header.textContent = mealType;

            const name = document.createElement('div');
            name.className = 'meal-name';
            name.textContent = meal.name || 'Meal';

            const ingredientsSection = document.createElement('div');
            ingredientsSection.className = 'ingredients-section';

            const ingredientsLabel = document.createElement('div');
            ingredientsLabel.className = 'section-label';
            ingredientsLabel.textContent = 'Ingredients';

            const ingredientsList = document.createElement('div');
            ingredientsList.className = 'ingredients-list';
            
            if (meal.ingredients && Array.isArray(meal.ingredients)) {
                meal.ingredients.forEach(ing => {
                    const item = document.createElement('div');
                    item.className = 'ingredient-item';
                    const text = ing.quantity && ing.unit 
                        ? `${ing.item} - ${ing.quantity} ${ing.unit}`
                        : (ing.item || ing);
                    item.textContent = text;
                    ingredientsList.appendChild(item);
                });
            }

            ingredientsSection.appendChild(ingredientsLabel);
            ingredientsSection.appendChild(ingredientsList);

            const instructionsSection = document.createElement('div');
            instructionsSection.className = 'instructions-section';

            const instructionsLabel = document.createElement('div');
            instructionsLabel.className = 'section-label';
            instructionsLabel.textContent = 'Instructions';

            const instructionsList = document.createElement('ol');
            instructionsList.className = 'instructions-list';
            
            if (meal.instructions && Array.isArray(meal.instructions)) {
                meal.instructions.forEach(instruction => {
                    const item = document.createElement('li');
                    item.className = 'instruction-item';
                    item.textContent = instruction;
                    instructionsList.appendChild(item);
                });
            }

            instructionsSection.appendChild(instructionsLabel);
            instructionsSection.appendChild(instructionsList);

            section.appendChild(header);
            section.appendChild(name);
            section.appendChild(ingredientsSection);
            section.appendChild(instructionsSection);

            return section;
        }

        function toggleAccordion(clickedAccordion, container) {
            // Close all accordions
            container.querySelectorAll('.day-accordion').forEach(acc => {
                acc.querySelector('.day-accordion-header').classList.remove('expanded');
                acc.querySelector('.day-accordion-content').classList.remove('expanded');
            });

            // Open clicked accordion
            clickedAccordion.querySelector('.day-accordion-header').classList.add('expanded');
            clickedAccordion.querySelector('.day-accordion-content').classList.add('expanded');
        }

        function renderGroceryList(groceryItems) {
            const groceryPanel = document.getElementById('groceryPanel');
            
            groceryPanel.innerHTML = '<div class="grocery-panel-title">🛒 Grocery List</div>';

            // Group by category
            const grouped = {};
            groceryItems.forEach(item => {
                const category = item.category || 'Other';
                if (!grouped[category]) {
                    grouped[category] = [];
                }
                grouped[category].push(item);
            });

            // Sort categories and render
            const sortedCategories = Object.keys(grouped).sort();
            sortedCategories.forEach(category => {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'grocery-category';

                const categoryLabel = document.createElement('div');
                categoryLabel.className = 'category-label';
                categoryLabel.textContent = category;
                categoryDiv.appendChild(categoryLabel);

                grouped[category].forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'grocery-item';
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'grocery-checkbox';
                    checkbox.addEventListener('change', (e) => {
                        e.target.parentElement.classList.toggle('checked');
                    });

                    const text = document.createElement('span');
                    text.className = 'grocery-item-text';
                    const quantity = item.quantity ? ` - ${item.quantity} ${item.unit || ''}`.trim() : '';
                    text.textContent = item.item + quantity;

                    itemDiv.appendChild(checkbox);
                    itemDiv.appendChild(text);
                    categoryDiv.appendChild(itemDiv);
                });

                groceryPanel.appendChild(categoryDiv);
            });
        }
    </script>
</body>
</html>
