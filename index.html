<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nourish - AI Meal Planner</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        
        /* INPUT SECTION */
        .input-section {
            background-color: #2c2c2c;
            padding: 30px;
            border-radius: 12px;
            max-width: 900px;
            margin: 0 auto 40px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .title { 
            font-size: 2em; 
            color: #ff6b35; 
            margin-bottom: 4px; 
            font-weight: 700;
        }
        
        .subtitle { 
            font-size: 1em; 
            color: #aaa; 
            margin-bottom: 8px; 
        }
        
        .model-indicator { 
            font-size: 0.85em; 
            color: #888; 
            margin-bottom: 20px; 
            padding: 8px 12px;
            background: #1a1a1a;
            border-radius: 6px;
            display: inline-block;
        }
        
        label { 
            display: block; 
            font-size: 0.9em; 
            color: #bbb; 
            margin-bottom: 6px; 
            margin-top: 18px;
            font-weight: 500;
        }
        
        input[type="text"] {
            background-color: #3c3c3c;
            color: #fff;
            border: 2px solid #444;
            padding: 12px 14px;
            border-radius: 8px;
            width: 100%;
            font-size: 1em;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus { 
            outline: none; 
            border-color: #ff6b35; 
        }
        
        .goal-label { 
            margin-top: 24px; 
            margin-bottom: 10px; 
            font-size: 0.9em; 
            color: #bbb;
            font-weight: 500;
        }
        
        .goal-buttons { 
            display: flex; 
            gap: 12px; 
        }
        
        .goal-btn {
            flex: 1; 
            padding: 12px; 
            border-radius: 8px;
            border: 2px solid #444; 
            background: #3c3c3c;
            color: #aaa; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s;
            font-size: 0.95em;
        }
        
        .goal-btn:hover {
            border-color: #555;
            background: #4c4c4c;
        }
        
        .goal-btn.active { 
            border-color: #ff6b35; 
            background: #ff6b35; 
            color: #fff; 
        }
        
        #generateBtn {
            width: 100%; 
            margin-top: 28px; 
            padding: 14px;
            border-radius: 8px; 
            border: none; 
            background: linear-gradient(135deg, #ff6b35, #ff8555);
            color: #fff; 
            font-size: 1em; 
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.2s;
        }
        
        #generateBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }
        
        #generateBtn:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
        }
        
        .control-messages {
            display: none; 
            margin-top: 20px;
        }
        
        #loading { 
            color: #ff6b35; 
            font-size: 0.95em; 
            text-align: center;
            padding: 12px;
            background: rgba(255, 107, 53, 0.1);
            border-radius: 8px;
            display: none;
        }
        
        #error {
            padding: 14px;
            background: rgba(255, 68, 68, 0.15); 
            border: 2px solid #ff4444;
            border-radius: 8px; 
            color: #ff6666; 
            font-size: 0.9em;
            display: none;
        }
        
        /* MEAL PLAN DISPLAY SECTION */
        .meal-plan-container {
            display: none;
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 24px;
        }
        
        .meal-plan-container.active { 
            display: grid; 
        }
        
        /* DAYS PANEL (LEFT) */
        .days-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* DAY CARD */
        .day-card {
            background: #2c2c2c;
            border-radius: 12px;
            border-left: 5px solid #ff6b35;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        
        .day-card-header {
            padding: 18px 20px;
            background: #3c3c3c;
            color: #fff;
            font-weight: 600;
            font-size: 1.1em;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            user-select: none;
        }
        
        .day-card-header:hover { 
            background: #4c4c4c; 
        }
        
        .day-card-header.expanded { 
            background: #ff6b35;
            color: #fff;
        }
        
        .day-arrow {
            font-size: 1.2em;
            transition: transform 0.3s;
        }
        
        .day-card-header.expanded .day-arrow {
            transform: rotate(180deg);
        }
        
        .day-card-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: #2c2c2c;
        }
        
        .day-card-content.expanded {
            max-height: 3000px;
        }
        
        .day-card-body {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* MEAL ACCORDION (nested inside day) */
        .meal-accordion {
            background: #3c3c3c;
            border-radius: 8px;
            border-left: 4px solid #ff6b35;
            overflow: hidden;
        }
        
        .meal-accordion-header {
            padding: 14px 16px;
            background: #3c3c3c;
            color: #fff;
            font-weight: 600;
            font-size: 0.95em;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            user-select: none;
        }
        
        .meal-accordion-header:hover {
            background: #4c4c4c;
        }
        
        .meal-accordion-header.expanded {
            background: #ff6b35;
            color: #fff;
        }
        
        .meal-accordion-arrow {
            font-size: 1em;
            transition: transform 0.3s;
        }
        
        .meal-accordion-header.expanded .meal-accordion-arrow {
            transform: rotate(180deg);
        }
        
        .meal-accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .meal-accordion-content.expanded {
            max-height: 1500px;
        }
        
        .meal-accordion-body {
            padding: 16px;
            background: #2c2c2c;
            border-top: 1px solid #4c4c4c;
        }
        
        .meal-name {
            font-size: 0.95em;
            color: #fff;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .meal-time {
            font-size: 0.85em;
            color: #aaa;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .nutrition-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }
        
        .nutrition-badge {
            display: flex;
            flex-direction: column;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8em;
            font-weight: 600;
            text-align: center;
        }
        
        .nutrition-badge .badge-label {
            font-size: 0.65em;
            opacity: 0.9;
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        
        .nutrition-badge .badge-value {
            font-size: 1em;
            font-weight: 700;
        }
        
        .badge-green {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #81c784;
        }
        
        .badge-yellow {
            background: rgba(255, 193, 7, 0.2);
            border: 1px solid #ffc107;
            color: #fff59d;
        }
        
        .badge-red {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #ef5350;
        }
        
        .ingredients-section {
            margin-bottom: 12px;
        }
        
        .section-label {
            font-size: 0.75em;
            color: #999;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.4px;
        }
        
        .ingredients-list {
            font-size: 0.85em;
            color: #ddd;
            line-height: 1.6;
        }
        
        .ingredient-item {
            margin-bottom: 4px;
            color: #e0e0e0;
            margin-left: 12px;
        }
        
        .ingredient-item::before {
            content: "•";
            margin-right: 8px;
            color: #ff6b35;
            font-weight: bold;
        }
        
        .instructions-section {
            margin-bottom: 0;
        }
        
        .instructions-list {
            font-size: 0.85em;
            color: #ddd;
            line-height: 1.6;
            list-style: none;
            counter-reset: step;
            margin-left: 0;
        }
        
        .instruction-item {
            margin-bottom: 8px;
            margin-left: 24px;
            counter-increment: step;
            position: relative;
            color: #e0e0e0;
        }
        
        .instruction-item::before {
            content: counter(step);
            position: absolute;
            left: -24px;
            top: 0;
            background: #ff6b35;
            color: #fff;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65em;
            font-weight: 700;
        }
        
        /* RIGHT PANEL */
        .right-panel {
            background: #2c2c2c;
            border-radius: 12px;
            border-left: 5px solid #ff6b35;
            padding: 24px;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            position: sticky;
            top: 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        
        .panel-title {
            font-size: 1.1em;
            font-weight: 700;
            color: #ff6b35;
            margin-bottom: 18px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .grocery-category {
            margin-bottom: 16px;
        }
        
        .grocery-category:last-child {
            margin-bottom: 0;
        }
        
        .category-label {
            font-size: 0.75em;
            font-weight: 700;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        
        .grocery-item {
            padding: 8px 0;
            font-size: 0.9em;
            color: #ddd;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        
        .grocery-checkbox {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #ff6b35;
            flex-shrink: 0;
            margin-top: 2px;
        }
        
        .grocery-item-text {
            flex: 1;
            word-break: break-word;
        }
        
        .grocery-item.checked .grocery-item-text {
            text-decoration: line-through;
            color: #666;
        }
        
        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #2c2c2c;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ff6b35;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #ff8555;
        }
        
        /* RESPONSIVE */
        @media (max-width: 1200px) {
            .meal-plan-container {
                grid-template-columns: 1fr;
            }
            
            .right-panel {
                position: static;
                max-height: none;
            }
        }
        
        @media (max-width: 768px) {
            .input-section {
                padding: 20px;
                margin-bottom: 30px;
            }
            
            .title {
                font-size: 1.6em;
            }
            
            .day-card-header {
                padding: 14px 16px;
                font-size: 1em;
            }
            
            .meal-accordion-header {
                padding: 12px 14px;
                font-size: 0.9em;
            }
            
            .day-card-body {
                padding: 12px;
                gap: 10px;
            }
            
            .goal-buttons {
                gap: 8px;
            }
            
            .goal-btn {
                padding: 10px;
                font-size: 0.85em;
            }
            
            #generateBtn {
                margin-top: 20px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- INPUT SECTION -->
    <div class="input-section">
        <h1 class="title">🍽️ Nourish</h1>
        <p class="subtitle">Your AI Meal Planner</p>
        <p id="modelIndicator" class="model-indicator">Loading model...</p>

        <label for="likes">Foods you like</label>
        <input type="text" id="likes" placeholder="e.g. chicken, pasta, avocado" />

        <label for="hates">Foods you hate or can't eat</label>
        <input type="text" id="hates" placeholder="e.g. mushrooms, shellfish, dairy" />

        <p class="goal-label">Your goal</p>
        <div class="goal-buttons">
            <button class="goal-btn" onclick="setGoal('Cut', this)">Cut</button>
            <button class="goal-btn" onclick="setGoal('Maintain', this)">Maintain</button>
            <button class="goal-btn" onclick="setGoal('Gain', this)">Gain</button>
        </div>

        <button id="generateBtn" onclick="generateMealPlan()">Generate 7-Day Meal Plan</button>

        <div class="control-messages">
            <div id="loading">🍳 Generating your cooked meal plan...</div>
            <div id="error"></div>
        </div>
    </div>

    <!-- MEAL PLAN DISPLAY -->
    <div class="meal-plan-container" id="mealPlanContainer">
        <div class="days-panel" id="daysPanel"></div>
        <div class="right-panel" id="rightPanel"></div>
    </div>

    <script>
        let goal = '';
        let activeModel = 'qwen2.5-coder-7b-instruct';
        let daysData = [];

        async function loadModel() {
            try {
                const res = await fetch('http://localhost:1234/v1/models');
                const data = await res.json();
                if (data?.data?.[0]?.id) {
                    activeModel = data.data[0].id;
                    document.getElementById('modelIndicator').textContent = '🤖 Model: ' + activeModel;
                }
            } catch (e) {
                document.getElementById('modelIndicator').textContent = '⚠️ Could not connect to LM Studio';
            }
        }

        loadModel();

        function setGoal(newGoal, btn) {
            goal = newGoal;
            document.querySelectorAll('.goal-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function generateMealPlan() {
            const likes = document.getElementById('likes').value.trim();
            const hates = document.getElementById('hates').value.trim();
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const btn = document.getElementById('generateBtn');
            const controlMessages = document.querySelector('.control-messages');

            if (!goal) {
                error.textContent = 'Please select a goal (Cut, Maintain, or Gain)';
                controlMessages.style.display = 'block';
                error.style.display = 'block';
                return;
            }

            if (!likes && !hates) {
                error.textContent = 'Enter at least some food preferences';
                controlMessages.style.display = 'block';
                error.style.display = 'block';
                return;
            }

            controlMessages.style.display = 'block';
            error.style.display = 'none';
            loading.style.display = 'block';
            btn.disabled = true;

            try {
                const response = await fetch('http://localhost:1234/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: activeModel,
                        messages: [
                            {
                                role: 'system',
                                content: 'Return ONLY valid JSON, no other text, no markdown. Generate a 7-day meal plan with breakfast lunch dinner each day. Real cooked meals with ingredients and steps. JSON only.'
                            },
                            {
                                role: 'user',
                                content: `Generate a 7-day meal plan with breakfast, lunch, and dinner each day. Goal: ${goal}. Favorite foods: ${likes || 'any'}. Avoid: ${hates || 'none'}.

Return this exact JSON structure (no markdown, no extra text):
{
  "days": [
    {
      "day": 1,
      "breakfast": {
        "name": "meal name",
        "time_minutes": 30,
        "nutrition": {"calories": 0, "protein_g": 0, "carbs_g": 0, "fat_g": 0},
        "ingredients": ["item 1", "item 2"],
        "steps": ["step 1", "step 2"]
      },
      "lunch": {...},
      "dinner": {...}
    }
  ]
}`
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 4000
                    })
                });

                if (!response.ok) throw new Error('API error');

                const data = await response.json();
                const result = data?.choices?.[0]?.message?.content;
                if (!result) throw new Error('No content');

                let parsedData;
                try {
                    const jsonMatch = result.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error('No JSON found in response');
                    parsedData = JSON.parse(jsonMatch[0]);
                } catch (parseErr) {
                    error.textContent = 'Failed to parse meal plan. The model may not have returned valid JSON.';
                    error.style.display = 'block';
                    loading.style.display = 'none';
                    btn.disabled = false;
                    return;
                }

                if (!parsedData.days || !Array.isArray(parsedData.days) || parsedData.days.length === 0) {
                    throw new Error('Invalid meal plan structure');
                }

                daysData = parsedData.days;
                renderMealPlan(daysData);
                updateRightPanel(daysData);
                controlMessages.style.display = 'none';
            } catch (err) {
                error.textContent = 'Error: ' + (err.message || 'Something went wrong. Make sure LM Studio is running on port 1234.');
                error.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                btn.disabled = false;
            }
        }

        function renderMealPlan(days) {
            document.getElementById('mealPlanContainer').classList.add('active');
            const daysPanel = document.getElementById('daysPanel');
            daysPanel.innerHTML = '';

            days.forEach((dayData, dayIndex) => {
                const dayCard = createDayCard(dayData, dayIndex);
                daysPanel.appendChild(dayCard);
            });

            // Expand first day by default
            if (daysPanel.children.length > 0) {
                const firstHeader = daysPanel.children[0].querySelector('.day-card-header');
                toggleDayCard(daysPanel.children[0]);
            }
        }

        function createDayCard(dayData, dayIndex) {
            const card = document.createElement('div');
            card.className = 'day-card';
            card.dataset.dayIndex = dayIndex;

            const header = document.createElement('div');
            header.className = 'day-card-header';
            header.textContent = `Day ${dayData.day}`;
            const arrow = document.createElement('span');
            arrow.className = 'day-arrow';
            arrow.textContent = '▾';
            header.appendChild(arrow);

            header.addEventListener('click', () => toggleDayCard(card));

            const content = document.createElement('div');
            content.className = 'day-card-content';

            const body = document.createElement('div');
            body.className = 'day-card-body';

            // Create meal accordions
            ['breakfast', 'lunch', 'dinner'].forEach(mealType => {
                const meal = dayData[mealType];
                if (meal) {
                    const mealAccordion = createMealAccordion(meal, mealType);
                    body.appendChild(mealAccordion);
                }
            });

            content.appendChild(body);
            card.appendChild(header);
            card.appendChild(content);

            return card;
        }

        function createMealAccordion(meal, mealType) {
            const accordion = document.createElement('div');
            accordion.className = 'meal-accordion';

            const mealTypeLabel = mealType.charAt(0).toUpperCase() + mealType.slice(1);

            const header = document.createElement('div');
            header.className = 'meal-accordion-header';
            header.textContent = `${mealTypeLabel}: ${meal.name}`;
            const arrow = document.createElement('span');
            arrow.className = 'meal-accordion-arrow';
            arrow.textContent = '▾';
            header.appendChild(arrow);

            header.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleMealAccordion(accordion);
            });

            const content = document.createElement('div');
            content.className = 'meal-accordion-content';

            const body = document.createElement('div');
            body.className = 'meal-accordion-body';

            // Meal name
            const nameDiv = document.createElement('div');
            nameDiv.className = 'meal-name';
            nameDiv.textContent = meal.name;
            body.appendChild(nameDiv);

            // Time
            const timeDiv = document.createElement('div');
            timeDiv.className = 'meal-time';
            timeDiv.innerHTML = `⏱️ ${meal.time_minutes || 30} minutes`;
            body.appendChild(timeDiv);

            // Nutrition Badges
            if (meal.nutrition) {
                const nutritionSection = document.createElement('div');
                nutritionSection.className = 'nutrition-section';
                
                const nutritionItems = [
                    { label: 'Calories', key: 'calories', value: meal.nutrition.calories, unit: 'kcal' },
                    { label: 'Protein', key: 'protein_g', value: meal.nutrition.protein_g, unit: 'g' },
                    { label: 'Carbs', key: 'carbs_g', value: meal.nutrition.carbs_g, unit: 'g' },
                    { label: 'Fat', key: 'fat_g', value: meal.nutrition.fat_g, unit: 'g' }
                ];
                
                nutritionItems.forEach(item => {
                    const badge = document.createElement('div');
                    badge.className = `nutrition-badge badge-green`;
                    badge.innerHTML = `
                        <div class="badge-label">${item.label}</div>
                        <div class="badge-value">${Math.round(item.value)}<span style="font-size: 0.8em; margin-left: 2px;">${item.unit}</span></div>
                    `;
                    nutritionSection.appendChild(badge);
                });
                
                body.appendChild(nutritionSection);
            }

            // Ingredients
            if (meal.ingredients && meal.ingredients.length > 0) {
                const ingredientsSection = document.createElement('div');
                ingredientsSection.className = 'ingredients-section';

                const ingredientsLabel = document.createElement('div');
                ingredientsLabel.className = 'section-label';
                ingredientsLabel.textContent = 'Ingredients';
                ingredientsSection.appendChild(ingredientsLabel);

                const ingredientsList = document.createElement('div');
                ingredientsList.className = 'ingredients-list';
                meal.ingredients.forEach(ing => {
                    const item = document.createElement('div');
                    item.className = 'ingredient-item';
                    item.textContent = ing;
                    ingredientsList.appendChild(item);
                });
                ingredientsSection.appendChild(ingredientsList);
                body.appendChild(ingredientsSection);
            }

            // Steps
            if (meal.steps && meal.steps.length > 0) {
                const stepsSection = document.createElement('div');
                stepsSection.className = 'instructions-section';

                const stepsLabel = document.createElement('div');
                stepsLabel.className = 'section-label';
                stepsLabel.textContent = 'Steps';
                stepsSection.appendChild(stepsLabel);

                const stepsList = document.createElement('ol');
                stepsList.className = 'instructions-list';
                meal.steps.forEach(step => {
                    const item = document.createElement('li');
                    item.className = 'instruction-item';
                    item.textContent = step;
                    stepsList.appendChild(item);
                });
                stepsSection.appendChild(stepsList);
                body.appendChild(stepsSection);
            }

            content.appendChild(body);
            accordion.appendChild(header);
            accordion.appendChild(content);

            return accordion;
        }

        function toggleDayCard(card) {
            const header = card.querySelector('.day-card-header');
            const content = card.querySelector('.day-card-content');
            header.classList.toggle('expanded');
            content.classList.toggle('expanded');
        }

        function toggleMealAccordion(accordion) {
            const header = accordion.querySelector('.meal-accordion-header');
            const content = accordion.querySelector('.meal-accordion-content');
            header.classList.toggle('expanded');
            content.classList.toggle('expanded');
        }

        function updateRightPanel(days) {
            const rightPanel = document.getElementById('rightPanel');
            rightPanel.innerHTML = '';

            // Extract all unique ingredients for grocery list
            const allIngredients = [];
            days.forEach(day => {
                ['breakfast', 'lunch', 'dinner'].forEach(mealType => {
                    const meal = day[mealType];
                    if (meal && meal.ingredients) {
                        allIngredients.push(...meal.ingredients);
                    }
                });
            });

            // Parse ingredients to extract quantity and category
            const groceryItems = parseGroceryItems(allIngredients);

            // Group by category
            const grouped = {};
            groceryItems.forEach(item => {
                const category = item.category || 'Other';
                if (!grouped[category]) grouped[category] = [];
                grouped[category].push(item);
            });

            // Grocery List Title
            const titleDiv = document.createElement('div');
            titleDiv.className = 'panel-title';
            titleDiv.textContent = '🛒 Grocery List';
            rightPanel.appendChild(titleDiv);

            // Grocery List Section
            const sortedCategories = Object.keys(grouped).sort();
            sortedCategories.forEach(category => {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'grocery-category';

                const categoryLabel = document.createElement('div');
                categoryLabel.className = 'category-label';
                categoryLabel.textContent = category;
                categoryDiv.appendChild(categoryLabel);

                grouped[category].forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'grocery-item';
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'grocery-checkbox';
                    checkbox.addEventListener('change', (e) => {
                        e.target.parentElement.classList.toggle('checked');
                    });

                    const text = document.createElement('span');
                    text.className = 'grocery-item-text';
                    text.textContent = item.name;

                    itemDiv.appendChild(checkbox);
                    itemDiv.appendChild(text);
                    categoryDiv.appendChild(itemDiv);
                });

                rightPanel.appendChild(categoryDiv);
            });
        }

        function parseGroceryItems(ingredients) {
            const items = [];
            const categories = {
                'chicken': 'Proteins', 'beef': 'Proteins', 'pork': 'Proteins', 'fish': 'Proteins', 'salmon': 'Proteins', 'shrimp': 'Proteins', 'turkey': 'Proteins', 'egg': 'Proteins', 'tofu': 'Proteins', 'lamb': 'Proteins',
                'milk': 'Dairy', 'cheese': 'Dairy', 'yogurt': 'Dairy', 'butter': 'Dairy', 'cream': 'Dairy',
                'rice': 'Grains', 'pasta': 'Grains', 'bread': 'Grains', 'oat': 'Grains', 'flour': 'Grains', 'quinoa': 'Grains',
                'tomato': 'Produce', 'onion': 'Produce', 'garlic': 'Produce', 'lettuce': 'Produce', 'spinach': 'Produce', 'broccoli': 'Produce', 'carrot': 'Produce', 'apple': 'Produce', 'banana': 'Produce', 'lemon': 'Produce', 'lime': 'Produce', 'bell pepper': 'Produce', 'mushroom': 'Produce', 'potato': 'Produce', 'zucchini': 'Produce', 'cucumber': 'Produce', 'celery': 'Produce', 'kale': 'Produce', 'cabbage': 'Produce', 'avocado': 'Produce',
                'oil': 'Pantry', 'salt': 'Pantry', 'pepper': 'Pantry', 'spice': 'Pantry', 'sauce': 'Pantry', 'vinegar': 'Pantry', 'soy': 'Pantry', 'garlic': 'Pantry'
            };

            ingredients.forEach(ing => {
                if (!ing) return;
                let category = 'Other';
                const lowerIng = ing.toLowerCase();
                for (const [key, cat] of Object.entries(categories)) {
                    if (lowerIng.includes(key)) {
                        category = cat;
                        break;
                    }
                }
                items.push({ name: ing, category: category });
            });

            return items;
        }
    </script>
</body>
