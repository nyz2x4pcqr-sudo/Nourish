<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nourish - AI Meal Planner</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        
        /* INPUT SECTION */
        .input-section {
            background-color: #2c2c2c;
            padding: 30px;
            border-radius: 12px;
            max-width: 900px;
            margin: 0 auto 40px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .title { 
            font-size: 2em; 
            color: #ff6b35; 
            margin-bottom: 4px; 
            font-weight: 700;
        }
        
        .subtitle { 
            font-size: 1em; 
            color: #aaa; 
            margin-bottom: 8px; 
        }
        
        .model-indicator { 
            font-size: 0.85em; 
            color: #888; 
            margin-bottom: 20px; 
            padding: 8px 12px;
            background: #1a1a1a;
            border-radius: 6px;
            display: inline-block;
        }
        
        label { 
            display: block; 
            font-size: 0.9em; 
            color: #bbb; 
            margin-bottom: 6px; 
            margin-top: 18px;
            font-weight: 500;
        }
        
        input[type="text"] {
            background-color: #3c3c3c;
            color: #fff;
            border: 2px solid #444;
            padding: 12px 14px;
            border-radius: 8px;
            width: 100%;
            font-size: 1em;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus { 
            outline: none; 
            border-color: #ff6b35; 
        }
        
        .goal-label { 
            margin-top: 24px; 
            margin-bottom: 10px; 
            font-size: 0.9em; 
            color: #bbb;
            font-weight: 500;
        }
        
        .goal-buttons { 
            display: flex; 
            gap: 12px; 
        }
        
        .goal-btn {
            flex: 1; 
            padding: 12px; 
            border-radius: 8px;
            border: 2px solid #444; 
            background: #3c3c3c;
            color: #aaa; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s;
            font-size: 0.95em;
        }
        
        .goal-btn:hover {
            border-color: #555;
            background: #4c4c4c;
        }
        
        .goal-btn.active { 
            border-color: #ff6b35; 
            background: #ff6b35; 
            color: #fff; 
        }
        
        #generateBtn {
            width: 100%; 
            margin-top: 28px; 
            padding: 14px;
            border-radius: 8px; 
            border: none; 
            background: linear-gradient(135deg, #ff6b35, #ff8555);
            color: #fff; 
            font-size: 1em; 
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.2s;
        }
        
        #generateBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }
        
        #generateBtn:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
        }
        
        .control-messages {
            display: none; 
            margin-top: 20px;
        }
        
        #loading { 
            color: #ff6b35; 
            font-size: 0.95em; 
            text-align: center;
            padding: 12px;
            background: rgba(255, 107, 53, 0.1);
            border-radius: 8px;
            display: none;
        }

        #usda-loading {
            color: #ff6b35;
            font-size: 0.85em;
            text-align: center;
            padding: 8px;
            background: rgba(255, 107, 53, 0.1);
            border-radius: 8px;
            display: none;
            margin-top: 12px;
        }
        
        #error {
            padding: 14px;
            background: rgba(255, 68, 68, 0.15); 
            border: 2px solid #ff4444;
            border-radius: 8px; 
            color: #ff6666; 
            font-size: 0.9em;
            display: none;
        }
        
        /* MEAL PLAN DISPLAY SECTION */
        .meal-plan-container {
            display: none;
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 24px;
        }
        
        .meal-plan-container.active { 
            display: grid; 
        }
        
        /* DAY CARDS (LEFT - ACCORDION) */
        .days-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .day-accordion {
            background: #2c2c2c;
            border-radius: 12px;
            border-left: 5px solid #ff6b35;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        
        .day-accordion-header {
            padding: 18px 20px;
            background: #3c3c3c;
            color: #fff;
            font-weight: 600;
            font-size: 1.1em;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            user-select: none;
        }
        
        .day-accordion-header:hover { 
            background: #4c4c4c; 
        }
        
        .day-accordion-header.expanded { 
            background: #ff6b35;
            color: #fff;
        }
        
        .accordion-arrow {
            font-size: 1.2em;
            transition: transform 0.3s;
        }
        
        .day-accordion-header.expanded .accordion-arrow {
            transform: rotate(180deg);
        }
        
        .day-accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: #2c2c2c;
        }
        
        .day-accordion-content.expanded {
            max-height: 5000px;
        }
        
        .day-content {
            padding: 24px;
        }
        
        .meal-section {
            margin-bottom: 20px;
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .meal-section:last-child {
            margin-bottom: 0;
        }
        
        .meal-accordion-header {
            padding: 14px 16px;
            background: #3c3c3c;
            color: #fff;
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            user-select: none;
        }
        
        .meal-accordion-header:hover {
            background: #4c4c4c;
        }
        
        .meal-accordion-header.expanded {
            background: #ff6b35;
            color: #fff;
        }
        
        .meal-accordion-header .meal-arrow {
            font-size: 1em;
            transition: transform 0.3s;
        }
        
        .meal-accordion-header.expanded .meal-arrow {
            transform: rotate(180deg);
        }
        
        .meal-accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .meal-accordion-content.expanded {
            max-height: 1000px;
        }
        
        .meal-content {
            padding: 16px;
            background: #2c2c2c;
        }
        
        .meal-type-label {
            font-size: 0.75em;
            font-weight: 700;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .meal-name {
            font-size: 1.05em;
            color: #fff;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .nutrition-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        
        .nutrition-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 600;
            color: #fff;
            min-width: 70px;
            text-align: center;
        }
        
        .badge-calories {
            background: rgba(255, 107, 53, 0.3);
            border: 1px solid #ff6b35;
            color: #ffb380;
        }
        
        .badge-protein {
            background: rgba(76, 175, 80, 0.3);
            border: 1px solid #4caf50;
            color: #81c784;
        }
        
        .badge-carbs {
            background: rgba(33, 150, 243, 0.3);
            border: 1px solid #2196f3;
            color: #64b5f6;
        }
        
        .badge-fat {
            background: rgba(255, 193, 7, 0.3);
            border: 1px solid #ffc107;
            color: #fff59d;
        }
        
        .badge-label {
            font-size: 0.65em;
            opacity: 0.85;
            margin-bottom: 2px;
        }
        
        .badge-value {
            font-size: 0.9em;
            font-weight: 700;
        }
        
        .ingredients-section {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #3c3c3c;
        }
        
        .section-label {
            font-size: 0.75em;
            color: #999;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        
        .ingredients-list {
            font-size: 0.9em;
            color: #ddd;
            line-height: 1.6;
        }
        
        .ingredient-item {
            margin-bottom: 6px;
            color: #e0e0e0;
        }
        
        .ingredient-item::before {
            content: "•";
            margin-right: 8px;
            color: #ff6b35;
            font-weight: bold;
        }
        
        .instructions-section {
            margin-bottom: 0;
        }
        
        .instructions-list {
            font-size: 0.9em;
            color: #ddd;
            line-height: 1.7;
            list-style: none;
            counter-reset: step;
            margin-left: 4px;
        }
        
        .instruction-item {
            margin-bottom: 8px;
            margin-left: 28px;
            counter-increment: step;
            position: relative;
            color: #e0e0e0;
        }
        
        .instruction-item::before {
            content: counter(step);
            position: absolute;
            left: -28px;
            top: 0;
            background: #ff6b35;
            color: #fff;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            font-weight: 700;
        }
        
        /* RIGHT PANEL */
        .nutrition-panel {
            background: #2c2c2c;
            border-radius: 12px;
            border-left: 5px solid #ff6b35;
            padding: 24px;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            position: sticky;
            top: 40px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        
        .panel-title {
            font-size: 1.1em;
            font-weight: 700;
            color: #ff6b35;
            margin-bottom: 18px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .panel-section {
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid #3c3c3c;
        }
        
        .panel-section:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        
        .summary-stat {
            margin-bottom: 14px;
        }
        
        .summary-stat:last-child {
            margin-bottom: 0;
        }
        
        .stat-label {
            font-size: 0.75em;
            color: #aaa;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 1.6em;
            font-weight: 700;
            color: #fff;
        }
        
        .stat-unit {
            font-size: 0.7em;
            color: #888;
            margin-left: 4px;
        }
        
        .stat-calories .stat-value { color: #ffb380; }
        .stat-protein .stat-value { color: #81c784; }
        .stat-carbs .stat-value { color: #64b5f6; }
        .stat-fat .stat-value { color: #fff59d; }
        
        .grocery-category {
            margin-bottom: 18px;
        }
        
        .grocery-category:last-child {
            margin-bottom: 0;
        }
        
        .category-label {
            font-size: 0.75em;
            font-weight: 700;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        
        .grocery-item {
            padding: 8px 0;
            font-size: 0.9em;
            color: #ddd;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        
        .grocery-checkbox {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #ff6b35;
            flex-shrink: 0;
            margin-top: 2px;
        }
        
        .grocery-item-text {
            flex: 1;
            word-break: break-word;
        }
        
        .grocery-item.checked .grocery-item-text {
            text-decoration: line-through;
            color: #666;
        }
        
        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #2c2c2c;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ff6b35;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #ff8555;
        }
        
        /* RESPONSIVE */
        @media (max-width: 1200px) {
            .meal-plan-container {
                grid-template-columns: 1fr;
            }
            
            .nutrition-panel {
                position: static;
                max-height: none;
            }
        }
        
        @media (max-width: 768px) {
            .input-section {
                padding: 20px;
                margin-bottom: 30px;
            }
            
            .title {
                font-size: 1.6em;
            }
            
            .day-accordion-header {
                padding: 14px 16px;
                font-size: 1em;
            }
            
            .day-content {
                padding: 16px;
            }
            
            .goal-buttons {
                gap: 8px;
            }
            
            .goal-btn {
                padding: 10px;
                font-size: 0.85em;
            }
            
            #generateBtn {
                margin-top: 20px;
                padding: 12px;
            }
            
            .nutrition-badges {
                gap: 6px;
            }
            
            .nutrition-badge {
                padding: 6px 10px;
                min-width: 60px;
            }
        }
    </style>
</head>
<body>
    <!-- INPUT SECTION -->
    <div class="input-section">
        <h1 class="title">🍽️ Nourish</h1>
        <p class="subtitle">Your AI Meal Planner</p>
        <p id="modelIndicator" class="model-indicator">Loading model...</p>

        <label for="likes">Foods you like</label>
        <input type="text" id="likes" placeholder="e.g. chicken, pasta, avocado" />

        <label for="hates">Foods you hate or can't eat</label>
        <input type="text" id="hates" placeholder="e.g. mushrooms, shellfish, dairy" />

        <p class="goal-label">Your goal</p>
        <div class="goal-buttons">
            <button class="goal-btn" onclick="setGoal('Cut', this)">Cut</button>
            <button class="goal-btn" onclick="setGoal('Maintain', this)">Maintain</button>
            <button class="goal-btn" onclick="setGoal('Gain', this)">Gain</button>
        </div>

        <button id="generateBtn" onclick="generateMealPlan()">Generate 7-Day Meal Plan</button>

        <div class="control-messages">
            <div id="loading">🍳 Generating your 7-day meal plan...</div>
            <div id="usda-loading">🔍 Fetching nutritional data from USDA...</div>
            <div id="error"></div>
        </div>
    </div>

    <!-- MEAL PLAN DISPLAY -->
    <div class="meal-plan-container" id="mealPlanContainer">
        <div class="days-panel" id="daysPanel"></div>
        <div class="nutrition-panel" id="nutritionPanel"></div>
    </div>

    <script>
        let goal = '';
        let activeModel = 'qwen2.5-coder-7b-instruct';
        let mealPlanData = null;
        let usda_cache = {};

        async function loadModel() {
            try {
                const res = await fetch('http://localhost:1234/v1/models');
                const data = await res.json();
                if (data?.data?.[0]?.id) {
                    activeModel = data.data[0].id;
                    document.getElementById('modelIndicator').textContent = '🤖 Model: ' + activeModel;
                }
            } catch (e) {
                document.getElementById('modelIndicator').textContent = '⚠️ Could not connect to LM Studio';
            }
        }

        loadModel();

        function setGoal(newGoal, btn) {
            goal = newGoal;
            document.querySelectorAll('.goal-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function generateMealPlan() {
            const likes = document.getElementById('likes').value.trim();
            const hates = document.getElementById('hates').value.trim();
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const btn = document.getElementById('generateBtn');
            const controlMessages = document.querySelector('.control-messages');

            if (!goal) {
                error.textContent = 'Please select a goal (Cut, Maintain, or Gain)';
                controlMessages.style.display = 'block';
                error.style.display = 'block';
                return;
            }

            controlMessages.style.display = 'block';
            error.style.display = 'none';
            loading.style.display = 'block';
            btn.disabled = true;

            try {
                const response = await fetch('http://localhost:1234/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: activeModel,
                        messages: [
                            {
                                role: 'system',
                                content: `You are a professional chef and nutritionist. Generate a 7-day meal plan based on user preferences and goals.

CRITICAL: Respond ONLY with valid JSON. No other text before or after the JSON.

Use this exact JSON structure:
{
  "days": [
    {
      "day": 1,
      "breakfast": {
        "name": "Meal name",
        "calories": 400,
        "protein": 25,
        "carbs": 45,
        "fat": 12,
        "ingredients": [
          {"item": "ingredient name", "quantity": "1", "unit": "cup"}
        ],
        "instructions": ["Step 1", "Step 2"]
      },
      "lunch": {"name": "", "calories": 0, "protein": 0, "carbs": 0, "fat": 0, "ingredients": [], "instructions": []},
      "dinner": {"name": "", "calories": 0, "protein": 0, "carbs": 0, "fat": 0, "ingredients": [], "instructions": []}
    }
  ],
  "groceryList": [
    {"item": "ingredient", "quantity": "2", "unit": "lbs", "category": "Produce"}
  ]
}

Requirements:
- Generate exactly 7 days
- Each day must have breakfast, lunch, and dinner
- Each meal MUST have: name, calories, protein (g), carbs (g), fat (g), ingredients array, instructions array
- Each ingredient must have: item, quantity, unit
- Instructions must be an array of strings
- Grocery list items must have: item, quantity, unit, category
- Categories: Produce, Proteins, Dairy, Grains, Pantry, Other
- Do not repeat meals across the 7 days
- Respond ONLY with the JSON object, no other text`
                            },
                            {
                                role: 'user',
                                content: `Goal: ${goal}
Favorite foods: ${likes || 'any'}
Foods to avoid: ${hates || 'none'}

Generate the 7-day meal plan as JSON only.`
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 5000
                    })
                });

                if (!response.ok) throw new Error('API error');

                const data = await response.json();
                const result = data?.choices?.[0]?.message?.content;
                if (!result) throw new Error('No content');

                // Parse and validate JSON
                let parsedMealPlan;
                try {
                    const jsonMatch = result.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error('No JSON found in response');
                    parsedMealPlan = JSON.parse(jsonMatch[0]);
                } catch (parseErr) {
                    error.textContent = 'Failed to parse meal plan. The model may not have returned valid JSON.';
                    error.style.display = 'block';
                    loading.style.display = 'none';
                    btn.disabled = false;
                    return;
                }

                if (!parsedMealPlan.days || !Array.isArray(parsedMealPlan.days) || parsedMealPlan.days.length === 0) {
                    throw new Error('Invalid meal plan structure');
                }

                mealPlanData = parsedMealPlan;
                renderMealPlan(mealPlanData);
                updateNutritionPanel();
                
                // Fetch USDA data for ingredients
                loading.style.display = 'none';
                document.getElementById('usda-loading').style.display = 'block';
                await fetchUSDAData(mealPlanData);
                document.getElementById('usda-loading').style.display = 'none';
                
                controlMessages.style.display = 'none';
            } catch (err) {
                error.textContent = 'Error: ' + (err.message || 'Something went wrong. Make sure LM Studio is running on port 1234.');
                error.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                document.getElementById('usda-loading').style.display = 'none';
                btn.disabled = false;
            }
        }

        async function fetchUSDAData(data) {
            const uniqueIngredients = new Set();
            data.days.forEach(day => {
                ['breakfast', 'lunch', 'dinner'].forEach(mealType => {
                    const meal = day[mealType];
                    if (meal && meal.ingredients) {
                        meal.ingredients.forEach(ing => {
                            uniqueIngredients.add(ing.item.toLowerCase());
                        });
                    }
                });
            });

            const ingredientArray = Array.from(uniqueIngredients);
            for (const ingredient of ingredientArray) {
                try {
                    const response = await fetch(
                        `https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(ingredient)}&pageSize=1&api_key=DEMO_KEY`
                    );
                    const result = await response.json();
                    if (result.foods && result.foods[0]) {
                        const food = result.foods[0];
                        const nutrients = {};
                        if (food.foodNutrients) {
                            food.foodNutrients.forEach(n => {
                                if (n.nutrientName === 'Energy') nutrients.calories = n.value;
                                if (n.nutrientName === 'Protein') nutrients.protein = n.value;
                                if (n.nutrientName === 'Carbohydrate, by difference') nutrients.carbs = n.value;
                                if (n.nutrientName === 'Total lipid (fat)') nutrients.fat = n.value;
                            });
                        }
                        usda_cache[ingredient] = nutrients;
                    }
                } catch (e) {
                    // Silently skip if USDA lookup fails
                }
            }
            
            updateNutritionBadges();
        }

        function updateNutritionBadges() {
            const badges = document.querySelectorAll('.nutrition-badge');
            badges.forEach(badge => {
                const parent = badge.closest('.meal-content');
                if (!parent) return;
                
                const mealName = parent.querySelector('.meal-name')?.textContent || '';
                const ingredients = parent.querySelector('.ingredients-list');
                if (!ingredients) return;
                
                const updatedCalories = updateBadgeValue(badge, 'Calories');
                const updatedProtein = updateBadgeValue(badge, 'Protein');
                const updatedCarbs = updateBadgeValue(badge, 'Carbs');
                const updatedFat = updateBadgeValue(badge, 'Fat');
            });
        }

        function updateBadgeValue(badge, nutrientType) {
            const badgeClass = {
                'Calories': 'badge-calories',
                'Protein': 'badge-protein',
                'Carbs': 'badge-carbs',
                'Fat': 'badge-fat'
            }[nutrientType];
            
            if (!badge.classList.contains(badgeClass)) return false;
            
            // Badges now show initial LM Studio values
            // USDA data is stored in cache for future use
            return true;
        }

        function renderMealPlan(data) {
            document.getElementById('mealPlanContainer').classList.add('active');
            const daysPanel = document.getElementById('daysPanel');
            daysPanel.innerHTML = '';

            data.days.forEach((dayData) => {
                const accordion = createDayAccordion(dayData);
                daysPanel.appendChild(accordion);

                const header = accordion.querySelector('.day-accordion-header');
                header.addEventListener('click', () => {
                    toggleDayAccordion(accordion, daysPanel);
                });
            });

            if (daysPanel.children.length > 0) {
                toggleDayAccordion(daysPanel.children[0], daysPanel);
            }
        }

        function createDayAccordion(dayData) {
            const accordion = document.createElement('div');
            accordion.className = 'day-accordion';

            const header = document.createElement('div');
            header.className = 'day-accordion-header';
            header.innerHTML = `Day ${dayData.day} <span class="accordion-arrow">▾</span>`;

            const content = document.createElement('div');
            content.className = 'day-accordion-content';

            const contentInner = document.createElement('div');
            contentInner.className = 'day-content';

            ['breakfast', 'lunch', 'dinner'].forEach(mealType => {
                const meal = dayData[mealType];
                if (meal) {
                    const mealSection = createMealAccordion(mealType, meal);
                    contentInner.appendChild(mealSection);
                }
            });

            content.appendChild(contentInner);
            accordion.appendChild(header);
            accordion.appendChild(content);

            return accordion;
        }

        function createMealAccordion(mealType, meal) {
            const section = document.createElement('div');
            section.className = 'meal-section';

            const header = document.createElement('div');
            header.className = 'meal-accordion-header';
            header.innerHTML = `<div style="font-weight: 600;">${meal.name || mealType}</div><span class="meal-arrow">▾</span>`;

            const content = document.createElement('div');
            content.className = 'meal-accordion-content';

            const contentInner = document.createElement('div');
            contentInner.className = 'meal-content';

            // Type label
            const typeLabel = document.createElement('div');
            typeLabel.className = 'meal-type-label';
            typeLabel.textContent = mealType.toUpperCase();
            contentInner.appendChild(typeLabel);

            // Meal name
            const nameDiv = document.createElement('div');
            nameDiv.className = 'meal-name';
            nameDiv.textContent = meal.name || 'Meal';
            contentInner.appendChild(nameDiv);

            // Badges
            const badges = document.createElement('div');
            badges.className = 'nutrition-badges';
            
            const caloriesBadge = document.createElement('div');
            caloriesBadge.className = 'nutrition-badge badge-calories';
            caloriesBadge.innerHTML = `<div class="badge-label">Calories</div><div class="badge-value">${Math.round(meal.calories || 0)}</div>`;
            badges.appendChild(caloriesBadge);

            const proteinBadge = document.createElement('div');
            proteinBadge.className = 'nutrition-badge badge-protein';
            proteinBadge.innerHTML = `<div class="badge-label">Protein</div><div class="badge-value">${Math.round(meal.protein || 0)}g</div>`;
            badges.appendChild(proteinBadge);

            const carbsBadge = document.createElement('div');
            carbsBadge.className = 'nutrition-badge badge-carbs';
            carbsBadge.innerHTML = `<div class="badge-label">Carbs</div><div class="badge-value">${Math.round(meal.carbs || 0)}g</div>`;
            badges.appendChild(carbsBadge);

            const fatBadge = document.createElement('div');
            fatBadge.className = 'nutrition-badge badge-fat';
            fatBadge.innerHTML = `<div class="badge-label">Fat</div><div class="badge-value">${Math.round(meal.fat || 0)}g</div>`;
            badges.appendChild(fatBadge);

            contentInner.appendChild(badges);

            // Ingredients
            if (meal.ingredients && meal.ingredients.length > 0) {
                const ingredientsSection = document.createElement('div');
                ingredientsSection.className = 'ingredients-section';

                const ingredientsLabel = document.createElement('div');
                ingredientsLabel.className = 'section-label';
                ingredientsLabel.textContent = 'Ingredients';
                ingredientsSection.appendChild(ingredientsLabel);

                const ingredientsList = document.createElement('div');
                ingredientsList.className = 'ingredients-list';
                meal.ingredients.forEach(ing => {
                    const item = document.createElement('div');
                    item.className = 'ingredient-item';
                    const qty = ing.quantity && ing.unit ? ` - ${ing.quantity} ${ing.unit}` : '';
                    item.textContent = ing.item + qty;
                    ingredientsList.appendChild(item);
                });
                ingredientsSection.appendChild(ingredientsList);
                contentInner.appendChild(ingredientsSection);
            }

            // Instructions
            if (meal.instructions && meal.instructions.length > 0) {
                const instructionsSection = document.createElement('div');
                instructionsSection.className = 'instructions-section';

                const instructionsLabel = document.createElement('div');
                instructionsLabel.className = 'section-label';
                instructionsLabel.textContent = 'Instructions';
                instructionsSection.appendChild(instructionsLabel);

                const instructionsList = document.createElement('ol');
                instructionsList.className = 'instructions-list';
                meal.instructions.forEach(instruction => {
                    const item = document.createElement('li');
                    item.className = 'instruction-item';
                    item.textContent = instruction;
                    instructionsList.appendChild(item);
                });
                instructionsSection.appendChild(instructionsList);
                contentInner.appendChild(instructionsSection);
            }

            content.appendChild(contentInner);
            section.appendChild(header);
            section.appendChild(content);

            // Add click handler for meal accordion
            header.addEventListener('click', () => {
                toggleMealAccordion(section);
            });

            return section;
        }

        function toggleDayAccordion(clickedAccordion, container) {
            container.querySelectorAll('.day-accordion').forEach(acc => {
                acc.querySelector('.day-accordion-header').classList.remove('expanded');
                acc.querySelector('.day-accordion-content').classList.remove('expanded');
            });

            clickedAccordion.querySelector('.day-accordion-header').classList.add('expanded');
            clickedAccordion.querySelector('.day-accordion-content').classList.add('expanded');
        }

        function toggleMealAccordion(section) {
            const header = section.querySelector('.meal-accordion-header');
            const content = section.querySelector('.meal-accordion-content');
            
            header.classList.toggle('expanded');
            content.classList.toggle('expanded');
        }

        function updateNutritionPanel() {
            const nutritionPanel = document.getElementById('nutritionPanel');
            nutritionPanel.innerHTML = '';

            if (!mealPlanData || !mealPlanData.days) return;

            let totalCalories = 0;
            let totalProtein = 0;
            let totalCarbs = 0;
            let totalFat = 0;

            mealPlanData.days.forEach(day => {
                ['breakfast', 'lunch', 'dinner'].forEach(mealType => {
                    const meal = day[mealType];
                    if (meal) {
                        totalCalories += meal.calories || 0;
                        totalProtein += meal.protein || 0;
                        totalCarbs += meal.carbs || 0;
                        totalFat += meal.fat || 0;
                    }
                });
            });

            // Nutrition Summary Title
            const titleDiv = document.createElement('div');
            titleDiv.className = 'panel-title';
            titleDiv.textContent = '📊 Weekly Summary';
            nutritionPanel.appendChild(titleDiv);

            // Weekly Totals Section
            const weeklySection = document.createElement('div');
            weeklySection.className = 'panel-section';

            const stats = [
                { label: 'Total Calories', value: Math.round(totalCalories), unit: 'kcal', className: 'stat-calories' },
                { label: 'Total Protein', value: Math.round(totalProtein), unit: 'g', className: 'stat-protein' },
                { label: 'Total Carbs', value: Math.round(totalCarbs), unit: 'g', className: 'stat-carbs' },
                { label: 'Total Fat', value: Math.round(totalFat), unit: 'g', className: 'stat-fat' }
            ];

            stats.forEach(stat => {
                const statDiv = document.createElement('div');
                statDiv.className = `summary-stat ${stat.className}`;
                statDiv.innerHTML = `
                    <div class="stat-label">${stat.label}</div>
                    <div class="stat-value">${stat.value}<span class="stat-unit">${stat.unit}</span></div>
                `;
                weeklySection.appendChild(statDiv);
            });

            nutritionPanel.appendChild(weeklySection);

            // Daily Average Section
            const dailySection = document.createElement('div');
            dailySection.className = 'panel-section';

            const dailyTitle = document.createElement('div');
            dailyTitle.className = 'panel-title';
            dailyTitle.style.fontSize = '0.95em';
            dailyTitle.style.marginBottom = '12px';
            dailyTitle.textContent = 'Daily Average';
            dailySection.appendChild(dailyTitle);

            const dailyStats = [
                { label: 'Calories', value: Math.round(totalCalories / 7), unit: 'kcal/day', emoji: '🔥' },
                { label: 'Protein', value: Math.round(totalProtein / 7), unit: 'g/day', emoji: '🥚' },
                { label: 'Carbs', value: Math.round(totalCarbs / 7), unit: 'g/day', emoji: '🍞' },
                { label: 'Fat', value: Math.round(totalFat / 7), unit: 'g/day', emoji: '🧈' }
            ];

            dailyStats.forEach(stat => {
                const statDiv = document.createElement('div');
                statDiv.className = 'summary-stat';
                statDiv.style.marginBottom = '8px';
                statDiv.style.paddingBottom = '0';
                statDiv.style.borderBottom = 'none';
                statDiv.innerHTML = `<div style="font-size: 0.9em; color: #ddd;">${stat.emoji} ${stat.value} ${stat.unit}</div>`;
                dailySection.appendChild(statDiv);
            });

            nutritionPanel.appendChild(dailySection);

            // Grocery List Section
            if (mealPlanData.groceryList && mealPlanData.groceryList.length > 0) {
                const grocerySection = document.createElement('div');
                grocerySection.className = 'panel-section';

                const groceryTitle = document.createElement('div');
                groceryTitle.className = 'panel-title';
                groceryTitle.style.fontSize = '0.95em';
                groceryTitle.style.marginBottom = '14px';
                groceryTitle.textContent = '🛒 Grocery List';
                grocerySection.appendChild(groceryTitle);

                // Group by category
                const grouped = {};
                mealPlanData.groceryList.forEach(item => {
                    const category = item.category || 'Other';
                    if (!grouped[category]) grouped[category] = [];
                    grouped[category].push(item);
                });

                const sortedCategories = Object.keys(grouped).sort();
                sortedCategories.forEach(category => {
                    const categoryDiv = document.createElement('div');
                    categoryDiv.className = 'grocery-category';

                    const categoryLabel = document.createElement('div');
                    categoryLabel.className = 'category-label';
                    categoryLabel.textContent = category;
                    categoryDiv.appendChild(categoryLabel);

                    grouped[category].forEach(item => {
                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'grocery-item';
                        
                        const checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.className = 'grocery-checkbox';
                        checkbox.addEventListener('change', (e) => {
                            e.target.parentElement.classList.toggle('checked');
                        });

                        const text = document.createElement('span');
                        text.className = 'grocery-item-text';
                        const quantity = item.quantity ? ` - ${item.quantity} ${item.unit || ''}`.trim() : '';
                        text.textContent = item.item + quantity;

                        itemDiv.appendChild(checkbox);
                        itemDiv.appendChild(text);
                        categoryDiv.appendChild(itemDiv);
                    });

                    grocerySection.appendChild(categoryDiv);
                });

                nutritionPanel.appendChild(grocerySection);
            }
        }
    </script>
</body>
</html>
