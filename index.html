<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Nourish Meal Planner</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        /* INPUT SECTION */
        .input-section {
            background-color: #2c2c2c;
            padding: 30px;
            border-radius: 12px;
            max-width: 900px;
            margin: 0 auto 40px;
        }
        .title { font-size: 2em; color: #ff6b35; margin-bottom: 4px; }
        .subtitle { font-size: 1em; color: #aaa; margin-bottom: 8px; }
        .model-indicator { font-size: 0.75em; color: #666; margin-bottom: 16px; }
        label { display: block; font-size: 0.85em; color: #aaa; margin-bottom: 4px; margin-top: 16px; }
        input {
            background-color: #3c3c3c;
            color: #fff;
            border: 1px solid #444;
            padding: 10px 14px;
            border-radius: 8px;
            width: 100%;
            font-size: 1em;
        }
        input:focus { outline: none; border-color: #ff6b35; }
        .goal-label { margin-top: 20px; margin-bottom: 8px; font-size: 0.85em; color: #aaa; }
        .goal-buttons { display: flex; gap: 10px; }
        .goal-btn {
            flex: 1; padding: 10px; border-radius: 8px;
            border: 2px solid #444; background: #3c3c3c;
            color: #aaa; font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        .goal-btn.active { border-color: #ff6b35; background: #ff6b35; color: #fff; }
        #generateBtn {
            width: 100%; margin-top: 24px; padding: 14px;
            border-radius: 8px; border: none; background: #ff6b35;
            color: #fff; font-size: 1.1em; font-weight: bold;
            cursor: pointer; transition: opacity 0.2s;
        }
        #generateBtn:disabled { opacity: 0.5; cursor: not-allowed; }
        .control-messages {
            display: none; margin-top: 16px;
        }
        #loading { color: #ff6b35; font-size: 1em; text-align: center; }
        #error {
            padding: 12px;
            background: #3a1a1a; border: 1px solid #ff4444;
            border-radius: 8px; color: #ff4444; font-size: 0.9em;
        }

        /* MEAL PLAN DISPLAY SECTION */
        .meal-plan-container {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 24px;
        }
        .meal-plan-container.active { display: grid; }

        /* DAY CARDS (LEFT - ACCORDION) */
        .days-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .day-accordion {
            background: #2c2c2c;
            border-radius: 12px;
            border-left: 4px solid #ff6b35;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .day-accordion-header {
            padding: 16px 20px;
            background: #3c3c3c;
            color: #fff;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .day-accordion-header:hover { background: #4c4c4c; }

        .day-accordion-header.expanded { background: #ff6b35; }

        .accordion-arrow {
            font-size: 1.2em;
            transition: transform 0.3s;
        }

        .day-accordion-header.expanded .accordion-arrow {
            transform: rotate(180deg);
        }

        .day-accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: #2c2c2c;
        }

        .day-accordion-content.expanded {
            max-height: 2000px;
        }

        .day-content {
            padding: 20px;
        }

        .meal-type {
            margin-bottom: 20px;
        }

        .meal-type:last-child { margin-bottom: 0; }

        .meal-type-header {
            font-size: 1em;
            font-weight: bold;
            color: #ff6b35;
            margin-bottom: 8px;
            text-transform: capitalize;
        }

        .meal-name {
            font-size: 1.05em;
            color: #fff;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .ingredients-section {
            margin-bottom: 12px;
        }

        .section-label {
            font-size: 0.85em;
            color: #aaa;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .ingredients-list {
            font-size: 0.9em;
            color: #ddd;
            line-height: 1.8;
            margin-left: 16px;
        }

        .ingredient-item {
            margin-bottom: 4px;
        }

        .instructions-section {
            margin-top: 12px;
        }

        .instructions-list {
            font-size: 0.9em;
            color: #ddd;
            line-height: 1.8;
            counter-reset: step;
            list-style: none;
        }

        .instruction-item {
            margin-bottom: 8px;
            margin-left: 24px;
            counter-increment: step;
            position: relative;
        }

        .instruction-item::before {
            content: counter(step);
            position: absolute;
            left: -24px;
            top: 0;
            background: #ff6b35;
            color: #fff;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: bold;
        }

        /* GROCERY LIST PANEL (RIGHT) */
        .grocery-panel {
            background: #2c2c2c;
            border-radius: 12px;
            border-left: 4px solid #44aa44;
            padding: 20px;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            position: sticky;
            top: 40px;
        }

        .grocery-panel-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #44aa44;
            margin-bottom: 16px;
            text-align: center;
        }

        .grocery-item {
            padding: 10px 0;
            border-bottom: 1px solid #3c3c3c;
            font-size: 0.95em;
            color: #ddd;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grocery-item:last-child { border-bottom: none; }

        .grocery-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #44aa44;
        }

        .grocery-item-text {
            flex: 1;
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .meal-plan-container {
                grid-template-columns: 1fr;
            }
            .grocery-panel {
                position: static;
                max-height: none;
            }
        }

        @media (max-width: 768px) {
            .input-section {
                padding: 20px;
            }
            .day-content {
                padding: 16px;
            }
            .day-accordion-header {
                padding: 14px 16px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <!-- INPUT SECTION -->
    <div class="input-section">
        <h1 class="title">🍽️ Nourish</h1>
        <p class="subtitle">Your AI Meal Planner</p>
        <p id="modelIndicator" class="model-indicator">Loading model...</p>

        <label>Foods you like</label>
        <input type="text" id="likes" placeholder="e.g. chicken, pasta, avocado" />

        <label>Foods you hate or can't eat</label>
        <input type="text" id="hates" placeholder="e.g. mushrooms, shellfish, dairy" />

        <p class="goal-label">Your goal</p>
        <div class="goal-buttons">
            <button class="goal-btn" onclick="setGoal('Cut', this)">Cut</button>
            <button class="goal-btn" onclick="setGoal('Maintain', this)">Maintain</button>
            <button class="goal-btn" onclick="setGoal('Gain', this)">Gain</button>
        </div>

        <button id="generateBtn" onclick="generateMealPlan()">Generate Meal Plan</button>

        <div class="control-messages">
            <div id="loading">🍳 Generating your meal plan...</div>
            <div id="error"></div>
        </div>
    </div>

    <!-- MEAL PLAN DISPLAY -->
    <div class="meal-plan-container" id="mealPlanContainer">
        <div class="days-panel" id="daysPanel"></div>
        <div class="grocery-panel" id="groceryPanel"></div>
    </div>

    <script>
        let goal = '';
        let currentMealPlan = '';
        let activeModel = 'qwen2.5-coder-7b-instruct';

        async function loadModel() {
            try {
                const res = await fetch('http://localhost:1234/v1/models');
                const data = await res.json();
                if (data?.data?.[0]?.id) {
                    activeModel = data.data[0].id;
                    document.getElementById('modelIndicator').textContent = '🤖 Model: ' + activeModel;
                }
            } catch (e) {
                document.getElementById('modelIndicator').textContent = '⚠️ Could not connect to LM Studio';
            }
        }

        loadModel();

        function setGoal(newGoal, btn) {
            goal = newGoal;
            document.querySelectorAll('.goal-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function generateMealPlan() {
            const likes = document.getElementById('likes').value.trim();
            const hates = document.getElementById('hates').value.trim();
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const btn = document.getElementById('generateBtn');
            const controlMessages = document.querySelector('.control-messages');

            if (!goal) {
                error.textContent = 'Please select a goal (Cut, Maintain, or Gain)';
                controlMessages.style.display = 'block';
                error.style.display = 'block';
                return;
            }

            controlMessages.style.display = 'block';
            error.style.display = 'none';
            loading.style.display = 'block';
            btn.disabled = true;

            try {
                const response = await fetch('http://localhost:1234/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: activeModel,
                        messages: [
                            {
                                role: 'system',
                                content: `You are a professional chef and nutritionist.

Generate a 3-day meal plan.

----------------------------
INPUT PARAMETERS
----------------------------
Goal: ${goal}
Likes: ${likes || 'anything'}
Dislikes: ${hates || 'none'}

----------------------------
STRICT OUTPUT RULES
----------------------------

1. OUTPUT LIMIT
- Generate EXACTLY 3 days only
- Each day must include: Breakfast, Lunch, Dinner
- Do not add anything outside these 3 days

2. NO EXTRA SECTIONS
- Do NOT include a grocery list
- Do NOT include summaries, notes, or commentary
- Do NOT include shopping suggestions or tips
- Output ONLY the meal plan

3. INGREDIENT RULES (VERY STRICT)
- Every ingredient in instructions MUST appear in the ingredients list
- Every ingredient must have a specific measurable quantity
- Do NOT use vague terms:
  ❌ "to taste"
  ❌ "optional"
  ❌ "a handful"
- Do NOT use generic groupings:
  ❌ "mixed vegetables"
  ❌ "seasonings"
  → Instead list each ingredient individually with quantities

4. COOKING REALISM RULES
- Use realistic cooking methods only
- Do NOT combine unrelated cooking processes (e.g., baking quinoa with salmon unless explicitly separate steps)
- Instructions must reflect real-world cooking practices

5. VARIETY RULE
- Do NOT repeat the same meal more than once across all 3 days

----------------------------
FORMAT (FOLLOW EXACTLY)
----------------------------

Day 1:
Breakfast:
Name:
Ingredients:
- ingredient (quantity + unit)
- ingredient (quantity + unit)
Instructions:
1.
2.
3.

Lunch:
Name:
Ingredients:
- ...
Instructions:
1.
2.
3.

Dinner:
Name:
Ingredients:
- ...
Instructions:
1.
2.
3.

(repeat same structure for Day 2 and Day 3)

----------------------------
FINAL RULE
----------------------------
If you violate any rule above, the response is invalid.`
                            },
                            {
                                role: 'user',
                                content: `Generate the 3-day meal plan following ALL the rules exactly. No exceptions.`
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 2000
                    })
                });

                if (!response.ok) throw new Error('API error');

                const data = await response.json();
                const result = data?.choices?.[0]?.message?.content;
                if (!result) throw new Error('No content');

                currentMealPlan = result;
                parseMealPlanAndRender(result);
                
                controlMessages.style.display = 'none';
            } catch (err) {
                error.textContent = 'Something went wrong. Make sure LM Studio is running on port 1234.';
                error.style.display = 'block';
            } finally {
                loading.style.display = 'none';
                btn.disabled = false;
            }
        }

        function parseMealPlanAndRender(mealPlanText) {
            // Parse text into structured data
            const mealData = [];
            const dayRegex = /Day (\d+):/i;
            const mealTypeRegex = /(Breakfast|Lunch|Dinner):/i;
            const nameRegex = /Name:\s*(.+?)(?=\n)/;
            const ingredientsRegex = /Ingredients:([\s\S]*?)(?=Instructions:|$)/i;
            const instructionsRegex = /Instructions:([\s\S]*?)(?=Breakfast:|Lunch:|Dinner:|Day \d+:|$)/i;

            const dayMatches = mealPlanText.split(/Day \d+:/i);

            for (let dayIndex = 1; dayIndex <= 3; dayIndex++) {
                if (!dayMatches[dayIndex]) break;
                
                const dayContent = dayMatches[dayIndex];
                const dayObj = { day: dayIndex, meals: {} };

                const mealTypes = ['Breakfast', 'Lunch', 'Dinner'];
                
                for (const mealType of mealTypes) {
                    const mealRegex = new RegExp(`${mealType}:(\\s*([\\s\\S]*?))(?=Breakfast:|Lunch:|Dinner:|$)`, 'i');
                    const mealMatch = dayContent.match(mealRegex);

                    if (mealMatch) {
                        const mealContent = mealMatch[1];
                        const nameMatch = mealContent.match(/Name:\s*(.+?)(?:\n|$)/i);
                        const ingredientsMatch = mealContent.match(/Ingredients:([\s\S]*?)(?=Instructions:|$)/i);
                        const instructionsMatch = mealContent.match(/Instructions:([\s\S]*?)(?=Breakfast:|Lunch:|Dinner:|$)/i);

                        const name = nameMatch ? nameMatch[1].trim() : 'Meal';
                        const ingredients = extractIngredients(ingredientsMatch ? ingredientsMatch[1] : '');
                        const instructions = extractInstructions(instructionsMatch ? instructionsMatch[1] : '');

                        dayObj.meals[mealType.toLowerCase()] = {
                            name,
                            ingredients,
                            instructions
                        };
                    }
                }

                mealData.push(dayObj);
            }

            renderMealPlan(mealData);
        }

        function extractIngredients(text) {
            return text
                .split('\n')
                .map(line => line.replace(/^[-•]\s*/, '').trim())
                .filter(line => line.length > 0);
        }

        function extractInstructions(text) {
            return text
                .split('\n')
                .map(line => line.replace(/^\d+\.\s*/, '').trim())
                .filter(line => line.length > 0);
        }

        function renderMealPlan(mealData) {
            document.getElementById('mealPlanContainer').classList.add('active');
            
            const daysPanel = document.getElementById('daysPanel');
            const groceryPanel = document.getElementById('groceryPanel');

            daysPanel.innerHTML = '';
            groceryPanel.innerHTML = '';

            // Render day accordions
            mealData.forEach((dayData, index) => {
                const accordion = createDayAccordion(dayData);
                daysPanel.appendChild(accordion);

                // Add expand/collapse handler
                const header = accordion.querySelector('.day-accordion-header');
                header.addEventListener('click', () => {
                    toggleAccordion(accordion, daysPanel);
                });
            });

            // Expand first day by default
            if (daysPanel.children.length > 0) {
                toggleAccordion(daysPanel.children[0], daysPanel);
            }

            // Render grocery list (placeholder - extract from meal data)
            renderGroceryList(mealData);
        }

        function createDayAccordion(dayData) {
            const accordion = document.createElement('div');
            accordion.className = 'day-accordion';

            const header = document.createElement('div');
            header.className = 'day-accordion-header';
            header.innerHTML = `
                Day ${dayData.day}
                <span class="accordion-arrow">▾</span>
            `;

            const content = document.createElement('div');
            content.className = 'day-accordion-content';

            const contentInner = document.createElement('div');
            contentInner.className = 'day-content';

            // Add meals
            ['breakfast', 'lunch', 'dinner'].forEach(mealType => {
                const meal = dayData.meals[mealType];
                if (meal) {
                    const mealHTML = createMealSection(mealType, meal);
                    contentInner.appendChild(mealHTML);
                }
            });

            content.appendChild(contentInner);
            accordion.appendChild(header);
            accordion.appendChild(content);

            return accordion;
        }

        function createMealSection(mealType, meal) {
            const section = document.createElement('div');
            section.className = 'meal-type';

            const header = document.createElement('div');
            header.className = 'meal-type-header';
            header.textContent = mealType;

            const name = document.createElement('div');
            name.className = 'meal-name';
            name.textContent = meal.name;

            const ingredientsSection = document.createElement('div');
            ingredientsSection.className = 'ingredients-section';

            const ingredientsLabel = document.createElement('div');
            ingredientsLabel.className = 'section-label';
            ingredientsLabel.textContent = 'Ingredients';

            const ingredientsList = document.createElement('div');
            ingredientsList.className = 'ingredients-list';
            meal.ingredients.forEach(ingredient => {
                const item = document.createElement('div');
                item.className = 'ingredient-item';
                item.textContent = ingredient;
                ingredientsList.appendChild(item);
            });

            ingredientsSection.appendChild(ingredientsLabel);
            ingredientsSection.appendChild(ingredientsList);

            const instructionsSection = document.createElement('div');
            instructionsSection.className = 'instructions-section';

            const instructionsLabel = document.createElement('div');
            instructionsLabel.className = 'section-label';
            instructionsLabel.textContent = 'Instructions';

            const instructionsList = document.createElement('ol');
            instructionsList.className = 'instructions-list';
            meal.instructions.forEach(instruction => {
                const item = document.createElement('li');
                item.className = 'instruction-item';
                item.textContent = instruction;
                instructionsList.appendChild(item);
            });

            instructionsSection.appendChild(instructionsLabel);
            instructionsSection.appendChild(instructionsList);

            section.appendChild(header);
            section.appendChild(name);
            section.appendChild(ingredientsSection);
            section.appendChild(instructionsSection);

            return section;
        }

        function toggleAccordion(clickedAccordion, container) {
            // Close all accordions
            container.querySelectorAll('.day-accordion').forEach(acc => {
                acc.querySelector('.day-accordion-header').classList.remove('expanded');
                acc.querySelector('.day-accordion-content').classList.remove('expanded');
            });

            // Open clicked accordion
            clickedAccordion.querySelector('.day-accordion-header').classList.add('expanded');
            clickedAccordion.querySelector('.day-accordion-content').classList.add('expanded');
        }

        function renderGroceryList(mealData) {
            const groceryPanel = document.getElementById('groceryPanel');
            
            // Extract all unique ingredients across all meals
            const groceryItems = new Set();
            
            mealData.forEach(dayData => {
                Object.values(dayData.meals).forEach(meal => {
                    meal.ingredients.forEach(ingredient => {
                        groceryItems.add(ingredient);
                    });
                });
            });

            groceryPanel.innerHTML = '<div class="grocery-panel-title">🛒 Grocery List</div>';

            const sortedItems = Array.from(groceryItems).sort();
            sortedItems.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'grocery-item';
                itemDiv.innerHTML = `
                    <input type="checkbox" class="grocery-checkbox" />
                    <span class="grocery-item-text">${item}</span>
                `;
                groceryPanel.appendChild(itemDiv);
            });
        }
    </script>
</body>
</html>
